<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卓報告ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  :root {
    --bg: #faf9f7;
    --white: #ffffff;
    --border: #e8e4de;
    --accent: #2a2a2a;
    --muted: #aaa89f;
    --text: #2a2a2a;
    --soft: #f3f1ed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header .logo-star {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  header h1 {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  header .sub {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-left: 4px;
  }

  .main {
    display: flex;
    flex: 1;
  }

  .panel-left {
    width: 420px;
    min-width: 300px;
    padding: 32px 28px;
    border-right: 1px solid var(--border);
    background: var(--white);
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
  }

  .section-title {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-title::before {
    content: '✦';
    font-size: 0.5rem;
    color: var(--muted);
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  input, select {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 300;
    font-size: 0.82rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(42,42,42,0.06);
  }

  input::placeholder { color: #ccc8c0; }
  select option { background: var(--white); }

  .row { display: flex; gap: 8px; }
  .row .field { flex: 1; }

  .template-tabs {
    display: flex;
    gap: 6px;
  }

  .tab {
    flex: 1;
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 9px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--white);
  }

  .toggle-row { display: flex; gap: 6px; }

  .toggle-btn {
    flex: 1;
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--white);
  }

  .ho-block {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .ho-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ho-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ho-label::before { content: '✧'; font-size: 0.55rem; }

  .btn-remove {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-remove:hover { border-color: #ddd; color: #bbb; }

  .btn-add {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 6px;
  }

  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--soft); }

  .divider { border: none; border-top: 1px solid var(--border); }

  .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .emoji-btn {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .emoji-btn.selected {
    border-color: var(--accent);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(42,42,42,0.07);
  }

  .emoji-btn:hover { border-color: var(--accent); }

  .panel-right {
    flex: 1;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg);
    position: relative;
  }

    text-transform: uppercase;

    display: flex;
    align-items: center;
    gap: 8px;

<body>

<header>
  <span class="logo-star">✦ ✧ ✦</span>
  <h1>卓報告ジェネレーター</h1>
  <span class="sub">CoC Report Generator</span>
</header>

<div class="main">
<div class="panel-left">

  <div>
    <div class="section-title">Template</div>
    <div class="template-tabs">
      <button class="tab active" onclick="setTemplate(0, this)">Type 1</button>
      <button class="tab" onclick="setTemplate(1, this)">Type 2</button>
      <button class="tab" onclick="setTemplate(2, this)">Type 3</button>
    </div>
  </div>

  <hr class="divider">

  <div id="field-emoji">
    <div class="section-title">Header Emoji</div>
    <div class="emoji-row">
      <button class="emoji-btn selected" onclick="selectEmoji(this, '𖤐')">𖤐</button>
      <button class="emoji-btn" onclick="selectEmoji(this, '☽')">☽</button>
      <button class="emoji-btn" onclick="selectEmoji(this, '✧')">✧</button>
      <button class="emoji-btn" onclick="selectEmoji(this, '🕸')">🕸</button>
      <button class="emoji-btn" onclick="selectEmoji(this, '🩸')">🩸</button>
      <button class="emoji-btn" onclick="selectEmoji(this, '🌑')">🌑</button>
    </div>
    <input type="text" id="custom-emoji" placeholder="✦ 自由入力（絵文字・記号など）" oninput="customEmoji(this.value)" style="margin-top:8px;">
  </div>

  <hr class="divider" id="divider-emoji">

  <div class="field">
    <label>✦ シナリオ名</label>
    <input type="text" id="scenario" placeholder="シナリオ名を入力" oninput="render()">
  </div>

  <div>
    <div class="section-title">KP Type</div>
    <div class="toggle-row" style="margin-bottom:10px;">
      <button class="toggle-btn active" onclick="setKPType('KP', this)">KP</button>
      <button class="toggle-btn" onclick="setKPType('KPC', this)">KPC</button>
    </div>
    <div class="field">
      <label id="kp-label">✧ KP名</label>
      <input type="text" id="kp" placeholder="名前を入力" oninput="render()">
    </div>
  </div>

  <hr class="divider">

  <div>
    <div class="section-title">PC / PL 表記</div>
    <div class="toggle-row">
      <button class="toggle-btn active" onclick="setPLType('PL', this)">PL</button>
      <button class="toggle-btn" onclick="setPLType('PC', this)">PC</button>
    </div>
  </div>

  <div>
    <div class="section-title">HO</div>
    <div id="ho-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    <button class="btn-add" onclick="addHO()">＋ HO を追加する</button>
  </div>

  <hr class="divider">

  <div>
    <div class="section-title">敬称略</div>
    <div class="toggle-row">
      <button class="toggle-btn active" onclick="setKeisho(true, this)">あり</button>
      <button class="toggle-btn" onclick="setKeisho(false, this)">なし</button>
    </div>
  </div>

  <hr class="divider">

  <div>
    <div class="section-title">Ending</div>
    <div class="row">
      <div class="field" style="flex:0 0 64px;">
        <label>番号</label>
        <input type="text" id="end-label" placeholder="A" oninput="render()" style="width:64px;">
      </div>
      <div class="field">
        <label>説明</label>
        <input type="text" id="end-desc" placeholder="両生還" oninput="render()">
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="field">
    <label>✦ フッター絵文字</label>
    <input type="text" id="footer-emoji" placeholder="🌕🍷" oninput="render()">
  </div>

</div>

<div class="panel-right">
  <div class="preview-label">Preview</div>
  <div class="preview-box" id="preview"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn-copy" id="copy-btn" onclick="copyText(false)">通常 Copy</button>
    <button class="btn-copy" id="copy-flat-btn" onclick="copyText(true)" style="background:var(--bg);color:var(--accent);border:1px solid var(--border);">左揃え Copy</button>
  </div>
</div>
</div>

<script>
  const STAR = '︎✦︎︎︎';
  let headerEmoji = '𖤐';
  let hoList = [];
  let hoCounter = 0;
  let currentTemplate = 0;
  let kpType = 'KP';
  let plType = 'PL';
  let showKeisho = true;

  function setTemplate(n, btn) {
    currentTemplate = n;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const showEmoji = n === 0;
    document.getElementById('field-emoji').style.display = showEmoji ? '' : 'none';
    document.getElementById('divider-emoji').style.display = showEmoji ? '' : 'none';
    render();
  }

  function selectEmoji(btn, emoji) {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('custom-emoji').value = '';
    headerEmoji = emoji;
    render();
  }

  function customEmoji(val) {
    if (val) {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      headerEmoji = val;
      render();
    }
  }

  function setKPType(type, btn) {
    kpType = type;
    document.querySelectorAll('.toggle-row')[0].querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('kp-label').textContent = '✧ ' + type + '名';
    render();
  }

  function setKeisho(val, btn) {
    showKeisho = val;
    btn.closest('.toggle-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setPLType(type, btn) {
    plType = type;
    document.querySelectorAll('.toggle-row')[1].querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function addHO() {
    hoCounter++;
    const id = hoCounter;
    const defaultNum = String(hoList.length + 1);
    hoList.push({ id, num: defaultNum, role: '', pl: '', chara: '' });
    renderHOInputs();
    render();
  }

  function removeHO(id) {
    hoList = hoList.filter(h => h.id !== id);
    renderHOInputs();
    render();
  }

  function renderHOInputs() {
    const container = document.getElementById('ho-list');
    container.innerHTML = '';
    hoList.forEach((ho, idx) => {
      const div = document.createElement('div');
      div.className = 'ho-block';
      div.innerHTML = `
        <div class="ho-header">
          <span class="ho-label">HO ${idx + 1}</span>
          <button class="btn-remove" onclick="removeHO(${ho.id})">削除</button>
        </div>
        <div class="row">
          <div class="field" style="flex:0 0 68px;">
            <label>番号</label>
            <input type="text" placeholder="${idx+1}" value="${ho.num}" oninput="updateHO(${ho.id},'num',this.value)" style="width:68px;">
          </div>
          <div class="field">
            <label>種族・役割</label>
            <input type="text" placeholder="吸血鬼" value="${ho.role}" oninput="updateHO(${ho.id},'role',this.value)">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>PL / PC名</label>
            <input type="text" placeholder="ろれつさん" value="${ho.pl}" oninput="updateHO(${ho.id},'pl',this.value)">
          </div>
          <div class="field">
            <label>キャラ名</label>
            <input type="text" placeholder="Răzvan" value="${ho.chara}" oninput="updateHO(${ho.id},'chara',this.value)">
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function updateHO(id, key, val) {
    const ho = hoList.find(h => h.id === id);
    if (ho) { ho[key] = val; render(); }
  }

  // ── 通常（スペース揃え）──

  function renderUmi() {
    const scenario = document.getElementById('scenario').value || 'シナリオ名';
    const kp = document.getElementById('kp').value || '🫧';
    const endLabel = document.getElementById('end-label').value || 'A';
    const endDesc = document.getElementById('end-desc').value || '';
    const footerEmoji = document.getElementById('footer-emoji').value || '';
    const endLine = endDesc ? `${endLabel}｜${endDesc}` : endLabel;

    let hoText = '';
    hoList.forEach((ho) => {
      const num = ho.num || '';
      const role = ho.role || '';
      const pl = ho.pl || '';
      const chara = ho.chara || '';
      hoText += `　ʜᴏ${toSup(num)}   ${role} ︴${pl}\n`;
      if (chara) hoText += `　　　　${chara}\n`;
    });
    hoText = hoText.replace(/\n$/, '');

    return [
      STAR, '',
      headerEmoji, '',
      `▮ ᴄᴀʟʟ ᴏꜰ ᴄᴛʜᴜʟʜᴜ`,
      `　${scenario}`, '',
      `｜ ${kpType}  ︴${kp}`, '',
      `｜ ᴘᴄ・${plType === 'PL' ? 'ᴘʟ' : 'ᴘᴄ'}`,
      hoText, '',
      `｜ ᴇɴᴅ ${endLine}`, '',
      footerEmoji, '',
      STAR,
    ].join('\n');
  }

  function renderStar() {
    const scenario = document.getElementById('scenario').value || 'シナリオ名';
    const kp = document.getElementById('kp').value || '';
    const endLabel = document.getElementById('end-label').value || '';
    const endDesc = document.getElementById('end-desc').value || '';
    const footerEmoji = document.getElementById('footer-emoji').value || '';
    const endLine = endDesc ? `${endLabel} - ${endDesc}` : endLabel;

    let hoText = '';
    hoList.forEach((ho) => {
      const num = ho.num || '';
      const role = ho.role || '';
      const pl = ho.pl || '';
      const chara = ho.chara || '';
      const nameStr = chara ? `${chara}　/ ${pl}` : pl;
      hoText += `　　　　HO${num}${role ? '：' + role : ''}：${nameStr}\n`;
    });
    hoText = hoText.replace(/\n$/, '');

    return [
      '✦', '',
      `　　　　　　　『${scenario}』`, '',
      `　　　　　　　${kpType}：${kp}`, '',
      hoText, '',
      `　　　　　　▎END - ${endLine}`,
      footerEmoji ? `\n${footerEmoji}` : '', '',
      '✦',
    ].join('\n').replace(/\n{3,}/g, '\n\n');
  }

  function renderLine() {
    const scenario = document.getElementById('scenario').value || 'シナリオ名';
    const kp = document.getElementById('kp').value || '';
    const endLabel = document.getElementById('end-label').value || '';
    const endDesc = document.getElementById('end-desc').value || '';
    const footerEmoji = document.getElementById('footer-emoji').value || '';
    const endLine = endDesc ? `${endLabel}｜${endDesc}` : endLabel;
    const div = '───────────────';

    let hoText = '';
    hoList.forEach((ho) => {
      const num = ho.num || '';
      const role = ho.role || '';
      const pl = ho.pl || '';
      const chara = ho.chara || '';
      const nameStr = chara ? `${chara} / ${pl}` : pl;
      hoText += `${role ? role : 'HO' + num}　${nameStr}\n`;
    });
    hoText = hoText.replace(/\n$/, '');

    const keishoLine = showKeisho ? '(敬称略)' : '';
    return [
      div, '',
      `𝐂𝐨𝐂`,
      `『${scenario}』`, '',
      `❙ ${kpType}`,
      kp, '',
      `❙ ${plType}`,
      hoText,
      keishoLine,
      footerEmoji,
      div,
    ].filter(l => l !== '').join('\n');
  }

  // ── 左揃え（Twitter用）──

  function renderUmiFlat() {
    const scenario = document.getElementById('scenario').value || 'シナリオ名';
    const kp = document.getElementById('kp').value || '🫧';
    const endLabel = document.getElementById('end-label').value || 'A';
    const endDesc = document.getElementById('end-desc').value || '';
    const footerEmoji = document.getElementById('footer-emoji').value || '';
    const endLine = endDesc ? `${endLabel}｜${endDesc}` : endLabel;

    let hoText = '';
    hoList.forEach((ho) => {
      const num = ho.num || '';
      const role = ho.role || '';
